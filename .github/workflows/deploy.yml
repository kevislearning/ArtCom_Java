name: Deploy Backend to DigitalOcean Droplet

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/art-gallery-backend
  DEPLOY_PATH: /var/www/artgallery/backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to the Container registry
        uses: docker/login-action@650006c88880c58e77c86518a2879685a499d0e7 # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@b2a7f01524316d3129598a614217112003c20202 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f82d23869279a0b940989396e982194883 # v4.1.0

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f30424a13247d519b7642646399c43831b1479 # v7.2.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Copy docker-compose.yml to Droplet
        uses: appleboy/scp-action@ff852467d341907796d19316d25287f39513361e # v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/docker-compose.yml"
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 1

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@2ead5e3d778d9b136894c770c0c594c96a32a67a # v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.DEPLOY_PATH }}
            
            # Login to GitHub Container Registry on Droplet
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            
            # Lowercase environment variable for image path compatibility in Compose
            export REPO_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            sed -i "s/\${GITHUB_REPOSITORY_OWNER}/$REPO_OWNER_LOWER/g" docker-compose.yml
            
            # Pull new image and restart container
            docker compose pull
            docker compose up -d
            
            # Clean up dangling images to save disk space
            docker image prune -f
