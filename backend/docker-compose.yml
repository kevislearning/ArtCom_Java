version: '3.8'

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/art-gallery-backend:latest
    container_name: art-gallery-backend
    ports:
      - "5000:5000"
    restart: always
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
